<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="bg2026" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a3c40" />
      <stop offset="50%" stop-color="#4dadf7" />
      <stop offset="100%" stop-color="#74c0fc" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.4" />
    </filter>
  </defs>
  <!-- Background Card -->
  <rect width="100" height="100" rx="8" fill="url(#bg2026)" />
  <circle cx="50" cy="50" r="45" fill="url(#glow)" />
  
  <!-- Year Text/Icon -->
  <g filter="url(#shadow)">
    <text x="50" y="47" font-family="'Outfit', 'Inter', 'Segoe UI', sans-serif" font-weight="900" font-size="28" fill="#ffffff" text-anchor="middle" letter-spacing="1">20</text>
    <text x="50" y="77" font-family="'Outfit', 'Inter', 'Segoe UI', sans-serif" font-weight="900" font-size="34" fill="#ffffff" text-anchor="middle" letter-spacing="1">26</text>
  </g>
</svg>
